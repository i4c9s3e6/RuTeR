# Example subject manifest for RuTeR pipeline
#
# Schema:
# [[subject]]
# subject_id = "..."
# crate_name = "..."
# source_type = "local_fixture" | "git" | "crates_io"
# path = "relative/or/absolute/path"            # required for local_fixture
# repo_url = "https://..."                      # required for git
# commit_hash = "..."                           # recommended for git; optional otherwise
# rust_toolchain = "stable"                     # required
# target_functions = ["foo::bar", "..."]       # optional
# expected_error_codes = ["E0433", "E0308"]    # optional
# notes = "free-form notes"

[[subject]]
subject_id = "example_local_fixture"
crate_name = "humantime"
source_type = "local_fixture"
path = "ruter/tests/humantime-e0433-gemini-fixture"
commit_hash = ""
rust_toolchain = "stable"
target_functions = ["src/duration.rs::tests_prepare::sample"]
expected_error_codes = ["E0433"]
notes = "Example local fixture entry for smoke-test pipeline development only."

[[subject]]
subject_id = "example_git_subject"
crate_name = "some-crate"
source_type = "git"
repo_url = "https://github.com/example/some-crate.git"
commit_hash = "0123456789abcdef"
rust_toolchain = "stable"
notes = "Future full-dataset entry; not supported by the current smoke-test scripts yet."
